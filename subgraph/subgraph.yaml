specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: RoundManager
    network: matic
    source:
      address: "0x31861F5E8540257AFd98C4F4693Aa67ac7462909"
      abi: RoundManager
      startBlock: 85564000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Round
        - Market
        - RoundMarket
      abis:
        - name: RoundManager
          file: ./abis/RoundManager.json
      eventHandlers:
        - event: RoundCreated(indexed uint256,bytes32[],uint64,uint64,uint64,uint16)
          handler: handleRoundCreated
        - event: BenchmarksPosted(indexed uint256,uint16[])
          handler: handleBenchmarksPosted
        - event: RoundInvalidated(indexed uint256)
          handler: handleRoundInvalidated
      file: ./src/round-manager.ts

  - kind: ethereum
    name: PredictionArena
    network: matic
    source:
      address: "0x95899D57cF8A74dC3892B93F221763a4547e394c"
      abi: PredictionArena
      startBlock: 85564000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - AgentRound
        - Agent
        - ReputationFeedback
      abis:
        - name: PredictionArena
          file: ./abis/PredictionArena.json
        - name: ConditionalTokens
          file: ./abis/ConditionalTokens.json
      eventHandlers:
        - event: Committed(indexed uint256,indexed address,bytes32,bytes32,uint256)
          handler: handleCommitted
        - event: Revealed(indexed uint256,indexed address,uint16[],uint16,uint256)
          handler: handleRevealed
        - event: ScoreComputed(indexed uint256,indexed address,uint256,int256,uint16)
          handler: handleScoreComputed
        - event: OutcomesTriggered(indexed uint256,uint256,uint16)
          handler: handleOutcomesTriggered
        - event: NewFeedback(indexed uint256,indexed address,uint64,int128,uint8,indexed string,string,string,string,string,bytes32)
          handler: handleNewFeedback
      file: ./src/prediction-arena.ts

  - kind: ethereum
    name: AgentNFT
    network: matic
    source:
      address: "0xB515aE5EA8AAF13b34D2C065a253630bAf83Fc19"
      abi: AgentNFT
      startBlock: 85564000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Agent
      abis:
        - name: AgentNFT
          file: ./abis/AgentNFT.json
      eventHandlers:
        - event: AgentRegistered(indexed uint256,indexed address,string,string)
          handler: handleAgentRegistered
        - event: AgentUpdated(indexed uint256,string,string,string)
          handler: handleAgentUpdated
      file: ./src/agent-nft.ts

  - kind: ethereum
    name: ConditionalTokens
    network: matic
    source:
      address: "0x4D97DCd97eC945f40cF65F87097ACe5EA0476045"
      abi: ConditionalTokens
      startBlock: 85564000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Market
      abis:
        - name: ConditionalTokens
          file: ./abis/ConditionalTokens.json
      eventHandlers:
        - event: ConditionResolution(indexed bytes32,indexed address,indexed bytes32,uint256,uint256[])
          handler: handleConditionResolution
      file: ./src/conditional-tokens.ts
