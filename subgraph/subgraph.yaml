specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: FastRoundManager
    network: matic
    source:
      address: "0x625eD13a6c37DA525C96C3FBF65f35E266268Ee0"
      abi: RoundManager
      startBlock: 85000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Round
        - Market
        - RoundMarket
      abis:
        - name: RoundManager
          file: ./abis/RoundManager.json
      eventHandlers:
        - event: RoundCreated(indexed uint256,bytes32[],uint64,uint64,uint64,uint16)
          handler: handleRoundCreated
        - event: BenchmarksPosted(indexed uint256,uint16[])
          handler: handleBenchmarksPosted
        - event: RoundInvalidated(indexed uint256)
          handler: handleRoundInvalidated
      file: ./src/fast-round-manager.ts

  - kind: ethereum
    name: PredictionArena
    network: matic
    source:
      address: "0xF0C6EFD4A2F1B10528A360F388fbE45839c1b60f"
      abi: PredictionArena
      startBlock: 85000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - AgentRound
        - Agent
      abis:
        - name: PredictionArena
          file: ./abis/PredictionArena.json
        - name: ConditionalTokens
          file: ./abis/ConditionalTokens.json
      eventHandlers:
        - event: Committed(indexed uint256,indexed address,bytes32,uint256)
          handler: handleCommitted
        - event: Revealed(indexed uint256,indexed address,uint16[],uint16,uint256)
          handler: handleRevealed
        - event: ScoreComputed(indexed uint256,indexed address,uint256,int256,uint16)
          handler: handleScoreComputed
      file: ./src/prediction-arena.ts

  - kind: ethereum
    name: AgentRegistry
    network: matic
    source:
      address: "0x908BEaAf43C5AFd84fEaF25B20E689E794F2b9a6"
      abi: AgentRegistry
      startBlock: 85000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Agent
      abis:
        - name: AgentRegistry
          file: ./abis/AgentRegistry.json
      eventHandlers:
        - event: AgentRegistered(indexed address,string,string,address)
          handler: handleAgentRegistered
        - event: AgentUpdated(indexed address,string,string,address)
          handler: handleAgentUpdated
      file: ./src/agent-registry.ts

  - kind: ethereum
    name: ConditionalTokens
    network: matic
    source:
      address: "0x4D97DCd97eC945f40cF65F87097ACe5EA0476045"
      abi: ConditionalTokens
      startBlock: 85000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Market
      abis:
        - name: ConditionalTokens
          file: ./abis/ConditionalTokens.json
      eventHandlers:
        - event: ConditionResolution(indexed bytes32,indexed address,indexed bytes32,uint256,uint256[])
          handler: handleConditionResolution
      file: ./src/conditional-tokens.ts
