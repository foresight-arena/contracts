specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: RoundManager
    network: matic
    source:
      address: "0x2FA165234ba5fE0bA309853c3fa2Df9949F867Cf"
      abi: RoundManager
      startBlock: 85597000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Round
        - Market
        - RoundMarket
      abis:
        - name: RoundManager
          file: ./abis/RoundManager.json
      eventHandlers:
        - event: RoundCreated(indexed uint256,bytes32[],uint64,uint64,uint64,uint16)
          handler: handleRoundCreated
        - event: BenchmarksPosted(indexed uint256,uint16[])
          handler: handleBenchmarksPosted
        - event: RoundInvalidated(indexed uint256)
          handler: handleRoundInvalidated
      file: ./src/round-manager.ts

  - kind: ethereum
    name: PredictionArena
    network: matic
    source:
      address: "0xB81e4F6D37f036508F584B8e9Cc1dceA096D554d"
      abi: PredictionArena
      startBlock: 85597000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - AgentRound
        - Agent
      abis:
        - name: PredictionArena
          file: ./abis/PredictionArena.json
        - name: ConditionalTokens
          file: ./abis/ConditionalTokens.json
      eventHandlers:
        - event: Committed(indexed uint256,indexed address,bytes32,bytes32,uint256)
          handler: handleCommitted
        - event: Revealed(indexed uint256,indexed address,uint16[],uint16,uint256)
          handler: handleRevealed
        - event: ScoreComputed(indexed uint256,indexed address,uint256,int256,uint16)
          handler: handleScoreComputed
        - event: OutcomesTriggered(indexed uint256,uint256,uint16)
          handler: handleOutcomesTriggered
      file: ./src/prediction-arena.ts

  - kind: ethereum
    name: IdentityRegistry
    network: matic
    source:
      address: "0x8004A169FB4a3325136EB29fA0ceB6D2e539a432"
      abi: IdentityRegistry
      startBlock: 85597000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Agent
      abis:
        - name: IdentityRegistry
          file: ./abis/IdentityRegistry.json
      eventHandlers:
        - event: Registered(indexed uint256,string,indexed address)
          handler: handleRegistered
        - event: URIUpdated(indexed uint256,string,indexed address)
          handler: handleURIUpdated
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleTransfer
      file: ./src/identity-registry.ts

  - kind: ethereum
    name: ConditionalTokens
    network: matic
    source:
      address: "0x4D97DCd97eC945f40cF65F87097ACe5EA0476045"
      abi: ConditionalTokens
      startBlock: 85597000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Market
      abis:
        - name: ConditionalTokens
          file: ./abis/ConditionalTokens.json
      eventHandlers:
        - event: ConditionResolution(indexed bytes32,indexed address,indexed bytes32,uint256,uint256[])
          handler: handleConditionResolution
      file: ./src/conditional-tokens.ts
