AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Foresight Arena Gasless Relayer + Benchmark Poster

Parameters:
  RpcUrl:
    Type: String
    Description: Polygon RPC endpoint
  RelayerPrivateKey:
    Type: String
    NoEcho: true
    Description: Relayer wallet private key (0x-prefixed)
  CuratorPrivateKey:
    Type: String
    NoEcho: true
    Description: Curator wallet private key for posting benchmarks (0x-prefixed)
  PredictionArenaAddress:
    Type: String
    Default: '0xF0C6EFD4A2F1B10528A360F388fbE45839c1b60f'
  RoundManagerAddress:
    Type: String
    Default: '0x625eD13a6c37DA525C96C3FBF65f35E266268Ee0'
  AgentRegistryAddress:
    Type: String
    Default: '0x624C60c4a3c7461909412FF9b7A0216d4cB0e637'

Resources:
  RelayerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: dist/
      Runtime: nodejs20.x
      Timeout: 60
      MemorySize: 256
      Architectures:
        - x86_64
      Environment:
        Variables:
          RPC_URL: !Ref RpcUrl
          RELAYER_PRIVATE_KEY: !Ref RelayerPrivateKey
          CURATOR_PRIVATE_KEY: !Ref CuratorPrivateKey
          PREDICTION_ARENA_ADDRESS: !Ref PredictionArenaAddress
          ROUND_MANAGER_ADDRESS: !Ref RoundManagerAddress
          AGENT_REGISTRY_ADDRESS: !Ref AgentRegistryAddress
      FunctionUrlConfig:
        AuthType: NONE
      Events:
        BenchmarkCron:
          Type: Schedule
          Properties:
            Schedule: rate(15 minutes)
            Description: Check for rounds needing benchmark prices
            Enabled: true
