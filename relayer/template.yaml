AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Foresight Arena Gasless Relayer + Benchmark Poster

Parameters:
  RpcUrl:
    Type: String
    Description: Polygon RPC endpoint
  RelayerPrivateKey:
    Type: String
    NoEcho: true
    Description: Relayer wallet private key (0x-prefixed)
  CuratorPrivateKey:
    Type: String
    NoEcho: true
    Description: Curator wallet private key for posting benchmarks (0x-prefixed)
  PredictionArenaAddress:
    Type: String
    Default: '0x9B8401db62bA6e95a57db38F383e6599C18041e7'
  RoundManagerAddress:
    Type: String
    Default: '0x1B27B5A3612F3ed7f12a674257aC3F067D08b481'

Resources:
  RelayerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: dist/
      Runtime: nodejs20.x
      Timeout: 60
      MemorySize: 256
      Architectures:
        - x86_64
      Environment:
        Variables:
          RPC_URL: !Ref RpcUrl
          RELAYER_PRIVATE_KEY: !Ref RelayerPrivateKey
          CURATOR_PRIVATE_KEY: !Ref CuratorPrivateKey
          PREDICTION_ARENA_ADDRESS: !Ref PredictionArenaAddress
          ROUND_MANAGER_ADDRESS: !Ref RoundManagerAddress
      FunctionUrlConfig:
        AuthType: NONE
      Events:
        BenchmarkCron:
          Type: Schedule
          Properties:
            Schedule: rate(15 minutes)
            Description: Check for rounds needing benchmark prices
            Enabled: true
