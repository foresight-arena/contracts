AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Foresight Arena Gasless Relayer + Benchmark Poster

Parameters:
  RpcUrl:
    Type: String
    Description: Polygon RPC endpoint
  RelayerPrivateKey:
    Type: String
    NoEcho: true
    Description: Relayer wallet private key (0x-prefixed)
  CuratorPrivateKey:
    Type: String
    NoEcho: true
    Description: Curator wallet private key for posting benchmarks (0x-prefixed)
  PredictionArenaAddress:
    Type: String
    Default: '0xB81e4F6D37f036508F584B8e9Cc1dceA096D554d'
  RoundManagerAddress:
    Type: String
    Default: '0x2FA165234ba5fE0bA309853c3fa2Df9949F867Cf'
  CuratorAddress:
    Type: String
    Default: '0x943507c28186741608a80777B03F045C84beA3A5'
    Description: Curator public address for voucher verification

Resources:
  VoucherTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: foresight-arena-vouchers
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  ReasoningBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'foresight-arena-reasoning-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireAfter1Year
            Status: Enabled
            ExpirationInDays: 365

  RelayerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: dist/
      Runtime: nodejs20.x
      Timeout: 60
      MemorySize: 256
      Architectures:
        - x86_64
      Environment:
        Variables:
          RPC_URL: !Ref RpcUrl
          RELAYER_PRIVATE_KEY: !Ref RelayerPrivateKey
          CURATOR_PRIVATE_KEY: !Ref CuratorPrivateKey
          PREDICTION_ARENA_ADDRESS: !Ref PredictionArenaAddress
          ROUND_MANAGER_ADDRESS: !Ref RoundManagerAddress
          CURATOR_ADDRESS: !Ref CuratorAddress
          REASONING_BUCKET: !Ref ReasoningBucket
          VOUCHER_TABLE: !Ref VoucherTable
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ReasoningBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref VoucherTable
      FunctionUrlConfig:
        AuthType: NONE
      Events:
        BenchmarkCron:
          Type: Schedule
          Properties:
            Schedule: rate(15 minutes)
            Description: Check for rounds needing benchmark prices
            Enabled: true
