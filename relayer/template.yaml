AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Foresight Arena Gasless Relayer + Benchmark Poster

Parameters:
  RpcUrl:
    Type: String
    Description: Polygon RPC endpoint
  RelayerPrivateKey:
    Type: String
    NoEcho: true
    Description: Relayer wallet private key (0x-prefixed)
  CuratorPrivateKey:
    Type: String
    NoEcho: true
    Description: Curator wallet private key for posting benchmarks (0x-prefixed)
  PredictionArenaAddress:
    Type: String
    Default: '0x5f28d56B4aBBE662c29755701C4a5f801Ace9D2a'
  RoundManagerAddress:
    Type: String
    Default: '0x9EB0BF21cE99f463Af2Ca67b4aFDa40e4905AE95'
  CuratorAddress:
    Type: String
    Default: '0x943507c28186741608a80777B03F045C84beA3A5'
    Description: Curator public address for voucher verification

Resources:
  ReasoningBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'foresight-arena-reasoning-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireAfter1Year
            Status: Enabled
            ExpirationInDays: 365

  RelayerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: dist/
      Runtime: nodejs20.x
      Timeout: 60
      MemorySize: 256
      Architectures:
        - x86_64
      Environment:
        Variables:
          RPC_URL: !Ref RpcUrl
          RELAYER_PRIVATE_KEY: !Ref RelayerPrivateKey
          CURATOR_PRIVATE_KEY: !Ref CuratorPrivateKey
          PREDICTION_ARENA_ADDRESS: !Ref PredictionArenaAddress
          ROUND_MANAGER_ADDRESS: !Ref RoundManagerAddress
          CURATOR_ADDRESS: !Ref CuratorAddress
          REASONING_BUCKET: !Ref ReasoningBucket
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ReasoningBucket
      FunctionUrlConfig:
        AuthType: NONE
      Events:
        BenchmarkCron:
          Type: Schedule
          Properties:
            Schedule: rate(15 minutes)
            Description: Check for rounds needing benchmark prices
            Enabled: true
